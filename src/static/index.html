<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>BooruSwipe</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div class="container">
        <div class="card-container">
            <div class="card" id="card">
                <div class="image-wrapper">
                    <img id="card-image" src="" alt="Swipeable image">
                </div>
                <div class="overlay" id="overlay"></div>
                <div class="indicator like-indicator" id="like-indicator">LIKE</div>
                <div class="indicator dislike-indicator" id="dislike-indicator">NOPE</div>
            </div>
            <div class="loading" id="loading">Loading...</div>
        </div>
        <div class="post-link-container">
            <a id="post-link" href="#" target="_blank" rel="noopener noreferrer">View on Gelbooru</a>
        </div>
        <div class="controls">
            <button class="control-btn dislike-x2-btn" id="dislike-x2-btn">✕ x2</button>
            <button class="control-btn dislike-btn" id="dislike-btn">✕</button>
            <button class="control-btn like-btn" id="like-btn">✓</button>
            <button class="control-btn like-x2-btn" id="like-x2-btn">✓ x2</button>
        </div>
        <div class="stats" id="stats">
            <span>Likes: <strong id="likes-count">0</strong></span>
            <span>Dislikes: <strong id="dislikes-count">0</strong></span>
        </div>
        <!-- <button class="settings-btn" id="settings-btn">⚙️ Settings</button> -->
    </div>
    
    <div class="modal" id="settings-modal">
        <div class="modal-content">
            <div class="modal-header">
                <h2>LLM Settings</h2>
                <button class="modal-close" id="settings-close">&times;</button>
            </div>
            <div class="modal-body">
                <form id="settings-form">
                    <div class="form-group">
                        <label for="api-key">API Key</label>
                        <input type="password" id="api-key" name="api_key" placeholder="Enter your API key">
                    </div>
                    <div class="form-group">
                        <label for="base-url">Base URL</label>
                        <input type="url" id="base-url" name="base_url" value="https://api.openai.com/v1" placeholder="https://api.openai.com/v1">
                    </div>
                    <div class="form-group">
                        <label for="model">Model</label>
                        <input type="text" id="model" name="model" value="gpt-4o-mini" placeholder="gpt-4o-mini">
                    </div>
                    <div class="form-actions">
                        <button type="button" class="test-btn" id="test-btn">Test Connection</button>
                        <button type="submit" class="save-btn">Save</button>
                    </div>
                    <div class="test-result" id="test-result"></div>
                </form>
            </div>
        </div>
    </div>
    
    <script src="app.js"></script>
</body>
</html>
